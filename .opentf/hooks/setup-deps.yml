apiVersion: opentestfactory.org/v1alpha1
kind: Hook
metadata:
  name: playwright-pre-install
events:
  category: execute
  on:
    - playwright/execute@v1
    - playwright/execute@v2
before:
  - run: |
      echo "=== DEBUG: Starting Hook Execution ==="
      echo "1. Current directory BEFORE navigating:"
      pwd
      
      # Now step into the cloned repository
      cd playwright-e2e-testing
      
      echo "2. Current directory AFTER navigating:"
      pwd
      
      # Finally, install the dependencies
      echo "3. Running npm install..."
      npm install
      echo "=== DEBUG: Hook Execution Finished ==="