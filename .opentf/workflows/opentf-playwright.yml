name: playwright-tests
jobs:
  test:
    runs-on: [linux, playwright]
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Install dependencies
        run: npm ci
      
      # - name: Install Playwright browsers
      #   run: npx playwright install chromium
      
      - name: Run tests
        run: npx playwright test